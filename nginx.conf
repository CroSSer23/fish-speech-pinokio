# ── Fish Speech Load Balancer ─────────────────────────────────────────────────
# Distributes TTS requests between multiple Fish Speech nodes.
# Install nginx, place this file, run: nginx -c /path/to/nginx.conf
#
# Access the combined endpoint at: http://<this-machine>:8080

upstream fish_speech_nodes {
    # Strategy: route to the node with fewest active connections
    least_conn;

    # ── Add your nodes here ───────────────────────────────────────────────────
    # Format: server <tailscale-ip>:<port>;
    # Get Tailscale IPs from the Tailscale tray icon or `tailscale ip`

    server 100.x.x.1:7860;  # Machine 1 — RTX 5090  (replace with real IP)
    server 100.x.x.2:7860;  # Machine 2 — RTX 4070 Super (replace with real IP)

    # Optional: weight=2 gives a node twice as many requests
    # server 100.x.x.1:7860 weight=2;  # 5090 gets 2x more load

    # Optional: mark a node as backup (only used when others are down)
    # server 100.x.x.2:7860 backup;
}

server {
    listen 8080;
    server_name _;

    # Increase timeouts for long TTS generation (line-by-line mode can take minutes)
    proxy_connect_timeout  30s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    location / {
        proxy_pass http://fish_speech_nodes;

        # WebSocket support (Gradio uses WebSockets for streaming)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large file uploads (reference audio)
        client_max_body_size 50M;
    }
}
